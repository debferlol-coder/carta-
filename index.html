<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para el amor de mi vida</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    overflow-x:hidden;
    color:white;
}

/* 🌌 ESTRELLAS */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* TITULO */
h1{
    text-align:center;
    color:gold;
    margin-top:30px;
    animation: fadeIn 2s ease;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* BOTÓN */
button{
    padding:15px 30px;
    border:none;
    border-radius:30px;
    background: linear-gradient(45deg, gold, orange);
    font-size:18px;
    cursor:pointer;
}

/* 🎧 BOTÓN MÚSICA */
.audio-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#7b2cbf;
    padding:12px;
    border-radius:50%;
    cursor:pointer;
}

/* 🦋 MARIPOSA FOLLOW */
.butterfly{
    position:fixed;
    width:60px;
    pointer-events:none;
    transition: all 0.2s linear;
}

/* 💌 CARTAS */
.card{
    margin:80px auto;
    width:90%;
    max-width:600px;
    perspective:1000px;
}

.inner{
    position:relative;
    width:100%;
    transform-style:preserve-3d;
    transition: transform 1s;
}

.card.open .inner{
    transform: rotateY(180deg);
}

.front, .back{
    position:absolute;
    width:100%;
    backface-visibility:hidden;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 20px rgba(255,0,255,0.5);
}

.front{
    background:#2a004d;
}

.back{
    background:#1a0033;
    transform: rotateY(180deg);
}

img{
    width:100%;
    border-radius:15px;
}

/* 💖 CORAZONES */
.heart{
    position:fixed;
    animation: float 6s linear infinite;
}

@keyframes float{
    0%{ transform:translateY(100vh); opacity:1;}
    100%{ transform:translateY(-10vh); opacity:0;}
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>Para el amor de mi vida 💜</h1>

<div style="text-align:center;">
<button onclick="start()">Empezar viaje ✨</button>
<p>🎶 Dos Oruguitas - Sebastián Yatra</p>
</div>

<audio id="music" loop>
<source src="dos_oruguitas.mp3">
</audio>

<div class="audio-btn" onclick="toggleMusic()">🎧</div>

<img src="https://cdn-icons-png.flaticon.com/512/616/616494.png" class="butterfly" id="butterfly">

<!-- 💌 CARTA 1 -->
<div class="card" onclick="openCard(this)">
<div class="inner">
<div class="front">💌 Tócame</div>
<div class="back">
<p>Desde que llegaste a mi vida, todo cambió 💜</p>
<img src="foto1.png">
</div>
</div>
</div>

<!-- 💌 CARTA 2 -->
<div class="card" onclick="openCard(this)">
<div class="inner">
<div class="front">💌 Ábreme</div>
<div class="back">
<p>Contigo todo es especial ✨</p>
<img src="foto2.png">
</div>
</div>
</div>

<!-- 💌 FINAL -->
<div class="card" onclick="openCard(this)">
<div class="inner">
<div class="front">💌 Última carta</div>
<div class="back">
<p>Te amo infinitamente 💖</p>
<img src="foto3.png">
</div>
</div>
</div>

<script>

/* 🎶 */
function start(){
document.getElementById("music").play();
}

/* 🎧 */
function toggleMusic(){
let m=document.getElementById("music");
m.paused?m.play():m.pause();
}

/* 💌 ABRIR CARTA */
function openCard(el){
el.classList.toggle("open");
}

/* 🦋 MARIPOSA FOLLOW */
document.addEventListener("mousemove", e=>{
let b=document.getElementById("butterfly");
b.style.top = e.clientY+"px";
b.style.left = e.clientX+"px";
});

/* 💖 CORAZONES */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(Math.random()*20+10)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},500);

/* 🌌 ESTRELLAS */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = Array(100).fill().map(()=>({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
r: Math.random()*2
}));

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
